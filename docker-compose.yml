version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: apartment_postgres
    environment:
      POSTGRES_USER: apartment
      POSTGRES_PASSWORD: apartment123
      POSTGRES_DB: apartment_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apartment -d apartment_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
